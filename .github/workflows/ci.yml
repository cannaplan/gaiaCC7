name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]  # Matches your Node 20 setup

    steps:
    - uses: actions/checkout@v4

    - name: Fix root permissions  # Key fix for root-owned files post-checkout
      run: sudo chown -R $(id -u):$(id -g) .

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # Cache deps for speed

    - name: Install dependencies
      run: npm ci  # Clean install from package-lock.json

    - name: Build
      run: npm run build  # Your React/Express build

    - name: Lint  # ESLint from your summary
      run: npm run lint

    - name: Test
      run: npm test  # Unit/UI tests
