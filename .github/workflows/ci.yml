name: Build Test
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: corepack enable
      - run: npm ci
      - run: npm run build --if-present
      - run: npm run lint --if-present || true
