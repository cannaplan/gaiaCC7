version: '3.8'

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      target: build
    # Static serve via nginx (post-build)

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    user: "1000:1000"  # Non-root fix
    volumes:
      - ./dist/server:/app/dist/server:ro
      - /app/node_modules
    depends_on:
      - db  # If needed

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist/client:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gaia
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    user: "1000:1000"  # Non-root

volumes:
  postgres_data:
